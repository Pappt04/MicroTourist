networks:
  microtourist:
    driver: bridge

services:

  # ── Stakeholders (Go + PostgreSQL) ────────────────────────────────────────
  stakeholders_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${STAKEHOLDERS_DB_USER:-admin}
      POSTGRES_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD:-secret}
      POSTGRES_DB: ${STAKEHOLDERS_DB_NAME:-stakeholders}
    volumes:
      - stakeholders_pgdata:/var/lib/postgresql/data
    networks:
      - microtourist
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAKEHOLDERS_DB_USER:-admin} -d ${STAKEHOLDERS_DB_NAME:-stakeholders}"]
      interval: 5s
      timeout: 5s
      retries: 10

  stakeholders:
    build: ./backend/stakeholders
    networks:
      - microtourist
    environment:
      DB_HOST: stakeholders_db
      DB_PORT: 5432
      DB_USER: ${STAKEHOLDERS_DB_USER:-admin}
      DB_PASSWORD: ${STAKEHOLDERS_DB_PASSWORD:-secret}
      DB_NAME: ${STAKEHOLDERS_DB_NAME:-stakeholders}
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme}
    depends_on:
      stakeholders_db:
        condition: service_healthy

  # ── RPC Gateway (Go) — translates HTTP to gRPC for stakeholders, tours, purchase ─
  rpc-gateway:
    build: ./gateway-go
    networks:
      - microtourist
    environment:
      STAKEHOLDERS_GRPC_ADDR: stakeholders:9090
      TOURS_GRPC_ADDR: tours:9091
      TOURS_HTTP_URL: http://tours:8084
      PURCHASE_GRPC_ADDR: purchase:9092
      BLOG_GRPC_ADDR: blog:50051
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme}
    depends_on:
      - stakeholders
      - tours
      - purchase
      - blog

  # ── Blog (Python + MongoDB) ───────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    volumes:
      - mongodata:/data/db
    networks:
      - microtourist
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "none"

  blog:
    build: ./backend/blog
    networks:
      - microtourist
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-microtourist_blog}
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme}
      FOLLOWERS_URL: http://followers:8083
    depends_on:
      mongo:
        condition: service_healthy

  # ── Purchase (Java + PostgreSQL) ──────────────────────────────────────────
  purchase_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PURCHASE_DB_USER:-admin}
      POSTGRES_PASSWORD: ${PURCHASE_DB_PASSWORD:-secret}
      POSTGRES_DB: ${PURCHASE_DB_NAME:-purchase}
    volumes:
      - purchase_pgdata:/var/lib/postgresql/data
    networks:
      - microtourist
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PURCHASE_DB_USER:-admin} -d ${PURCHASE_DB_NAME:-purchase}"]
      interval: 5s
      timeout: 5s
      retries: 10

  purchase:
    build: ./backend/purchase
    networks:
      - microtourist
    environment:
      DB_HOST: purchase_db
      DB_PORT: 5432
      DB_USER: ${PURCHASE_DB_USER:-admin}
      DB_PASSWORD: ${PURCHASE_DB_PASSWORD:-secret}
      DB_NAME: ${PURCHASE_DB_NAME:-purchase}
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme}
      TOURS_SERVICE_URL: http://tours:8084
    depends_on:
      purchase_db:
        condition: service_healthy

  # ── Followers (Java + Neo4j) ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j123}
    volumes:
      - neo4jdata:/data
    networks:
      - microtourist
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  followers:
    build: ./backend/followers
    networks:
      - microtourist
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j123}
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme}
    depends_on:
      neo4j:
        condition: service_healthy

  # ── Tours (Java + MongoDB) ────────────────────────────────────────────────
  tours:
    build: ./backend/tours
    networks:
      - microtourist
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${TOURS_MONGO_DB:-microtourist_tours}
      TOKEN_SECRET: ${TOKEN_SECRET:-changeme}
      PURCHASE_SERVICE_URL: http://purchase:8082
    restart: on-failure
    depends_on:
      mongo:
        condition: service_healthy

  # ── Monitoring: Node Exporter + Prometheus + Grafana ─────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - microtourist
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    ports:
      - "8090:8080"
    networks:
      - microtourist
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - microtourist
    ports:
      - "9095:9090"
    depends_on:
      - node-exporter
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - microtourist
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build: ./frontend/microtourist
    networks:
      - microtourist
    restart: on-failure
    depends_on:
      - stakeholders
      - blog
      - purchase
      - followers
      - tours

  # ── API Gateway (Nginx) ───────────────────────────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    networks:
      - microtourist
    restart: on-failure
    depends_on:
      - frontend
      - stakeholders
      - rpc-gateway
      - blog
      - purchase
      - followers
      - tours

volumes:
  stakeholders_pgdata:
  purchase_pgdata:
  neo4jdata:
  mongodata:
  prometheus_data:
  grafana_data:
