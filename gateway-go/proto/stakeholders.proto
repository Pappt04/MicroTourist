syntax = "proto3";

package stakeholders;

option go_package = "./pb";

service StakeholdersService {
    rpc Register (RegisterRequest)  returns (RegisterResponse);
    rpc Login    (LoginRequest)     returns (LoginResponse);
}

message RegisterRequest {
    string username = 1;
    string password = 2;
    string email    = 3;
    string role     = 4;
}

message RegisterResponse {
    int64  id         = 1;
    string username   = 2;
    string email      = 3;
    string role       = 4;
    bool   is_blocked = 5;
    string error      = 6;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token      = 1;
    int64  id         = 2;
    string username   = 3;
    string email      = 4;
    string role       = 5;
    bool   is_blocked = 6;
    string error      = 7;
}
