server {
    listen 80;
    client_max_body_size 20m;

    # RPC: register and login routed through Go rpc-gateway → stakeholders via gRPC
    location = /api/stakeholders/register {
        proxy_pass http://rpc-gateway:8086/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location = /api/stakeholders/login {
        proxy_pass http://rpc-gateway:8086/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # RPC: GET profile by id routed through Go rpc-gateway → stakeholders via gRPC
    location ~ "^/api/stakeholders/profile/(\d+)$" {
        proxy_pass http://rpc-gateway:8086/profile/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # RPC: GET all accounts routed through Go rpc-gateway → stakeholders via gRPC
    location = /api/stakeholders/admin/accounts {
        proxy_pass http://rpc-gateway:8086/admin/accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    location /api/stakeholders/ {
        proxy_pass http://stakeholders:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # RPC: GET all blogs routed through Go rpc-gateway → blog via gRPC
    location = /api/blog/blogs {
        proxy_pass http://rpc-gateway:8086/blogs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # RPC: GET single blog by ID routed through Go rpc-gateway → blog via gRPC
    location ~ "^/api/blog/blogs/([0-9a-f]{24})$" {
        proxy_pass http://rpc-gateway:8086/blogs/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/blog/ {
        proxy_pass http://blog:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # RPC: GET /cart and GET /purchases routed through Go rpc-gateway → purchase via gRPC
    location = /api/purchase/cart {
        proxy_pass http://rpc-gateway:8086/cart;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    location = /api/purchase/purchases {
        proxy_pass http://rpc-gateway:8086/purchases;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    location /api/purchase/ {
        proxy_pass http://purchase:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/followers/ {
        proxy_pass http://followers:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # RPC: GET published tours and GET tour by ID routed through Go rpc-gateway → tours via gRPC
    location = /api/tours/published {
        proxy_pass http://rpc-gateway:8086/tours/published;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location ~ "^/api/tours/([0-9a-f]{24})$" {
        proxy_pass http://rpc-gateway:8086/tours/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location = /api/tours {
        proxy_pass http://tours:8084/tours;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /api/tours/ {
        proxy_pass http://tours:8084/tours/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
