services:

  # ── databases ────────────────────────────────────────────────────────────────

  postgres-followers:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pgdata-followers:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7-jammy
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "none"

  # ── services ─────────────────────────────────────────────────────────────────

  stakeholders:
    build: ./backend/stakeholders
    ports:
      - "${STAKEHOLDERS_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${STAKEHOLDERS_DB_NAME:-microtourist-stakeholders}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  blog:
    build: ./backend/blog
    ports:
      - "${BLOG_PORT:-8081}:8081"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-microtourist_blog}
    depends_on:
      mongo:
        condition: service_healthy

  followers:
    build: ./backend/followers
    ports:
      - "${FOLLOWERS_PORT:-8083}:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-followers:5432/${FOLLOWERS_DB_NAME:-microtourist-followers}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      postgres-followers:
  purchase:
    build: ./backend/purchase
    ports:
      - "${PURCHASE_PORT:-8082}:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${PURCHASE_DB_NAME:-microtourist-purchase}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  pgdata-followers:
  mongodata:
