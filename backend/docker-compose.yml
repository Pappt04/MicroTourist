services:

  # ── databases ────────────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j123}
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 15

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${STAKEHOLDERS_DB_NAME:-microtourist-stakeholders}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7-jammy
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "none"

  # ── services ─────────────────────────────────────────────────────────────────

  stakeholders:
    build: ./stakeholders
    ports:
      - "${STAKEHOLDERS_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${STAKEHOLDERS_DB_NAME:-microtourist-stakeholders}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  blog:
    build: ./blog
    ports:
      - "${BLOG_PORT:-8081}:8081"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-microtourist_blog}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
      FOLLOWERS_URL: http://followers:8083
    depends_on:
      mongo:
        condition: service_healthy
      followers:
        condition: service_started

  followers:
    build: ./followers
    ports:
      - "${FOLLOWERS_PORT:-8083}:8083"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j123}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      neo4j:
        condition: service_healthy

  purchase:
    build: ./purchase
    ports:
      - "${PURCHASE_PORT:-8082}:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${PURCHASE_DB_NAME:-microtourist-purchase}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  tours:
    build: ./tours
    ports:
      - "${TOURS_PORT:-8084}:8084"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${TOURS_MONGO_DB:-microtourist-tours}
      TOKEN_SECRET: ${TOKEN_SECRET:-dev-secret-change-me}
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
  mongodata:
